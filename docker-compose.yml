services:
  postgres:
    image: postgres:16-alpine
    container_name: samayak-postgres
    restart: always
    environment:
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: forge
      POSTGRES_DB: forge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: samayak-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: samayak-backend
    restart: always
    environment:
      DATABASE_URL: "postgresql://forge:forge@postgres:5432/forge"
      REDIS_URL: "redis://redis:6379"
      FRONTEND_URL: "http://localhost:3000"
      UPLOAD_DIR: "/app/uploads"
      RUN_WORKER_IN_PROCESS: "false"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      AUTH_SECRET: "${AUTH_SECRET}"
      PORT: 3001
      NODE_ENV: production
    ports:
      - "3001:3001"
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "bunx prisma db push && bun run db:seed && bun run src/index.ts"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: samayak-worker
    restart: always
    environment:
      DATABASE_URL: "postgresql://forge:forge@postgres:5432/forge"
      REDIS_URL: "redis://redis:6379"
      FRONTEND_URL: "http://localhost:3000"
      AUTH_SECRET: "${AUTH_SECRET}"
      UPLOAD_DIR: "/app/uploads"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      NODE_ENV: production
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["bun", "run", "src/worker.ts"]

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  uploads:
    driver: local